name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release_preflight:
    runs-on: macos-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Validate hosted release secrets
        env:
          APPLE_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          [ -n "${APPLE_PROVISIONING_PROFILE_BASE64:-}" ] || { echo "APPLE_PROVISIONING_PROFILE_BASE64 secret is required."; exit 1; }
          [ -n "${TAURI_SIGNING_PRIVATE_KEY:-}" ] || { echo "TAURI_SIGNING_PRIVATE_KEY secret is required."; exit 1; }
          [ -n "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}" ] || { echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD secret is required."; exit 1; }

      - name: Decode and validate provisioning profile
        env:
          APPLE_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
        run: |
          PROFILE_PATH="$RUNNER_TEMP/madi-cloudkit.provisionprofile"
          printf '%s' "$APPLE_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"
          PROFILE_PLIST="$RUNNER_TEMP/madi-cloudkit.plist"
          security cms -D -i "$PROFILE_PATH" > "$PROFILE_PLIST"
          /usr/libexec/PlistBuddy -c "Print :Entitlements:com.apple.developer.aps-environment" "$PROFILE_PLIST" >/dev/null
          /usr/libexec/PlistBuddy -c "Print :Entitlements:com.apple.developer.icloud-services" "$PROFILE_PLIST" >/dev/null
          /usr/libexec/PlistBuddy -c "Print :Entitlements:com.apple.developer.icloud-container-identifiers" "$PROFILE_PLIST" | grep -Fq "iCloud.com.seongmin.madi" || { echo "Madi iCloud container is required."; exit 1; }
          /usr/libexec/PlistBuddy -c "Print :Entitlements:com.apple.developer.icloud-container-identifiers" "$PROFILE_PLIST" | grep -Fq "iCloud.com.seongmin.minnote" || { echo "Legacy iCloud container is required for Phase 2 read-only import."; exit 1; }
          [ -x ./scripts/package-notarized-app.sh ] || { echo "scripts/package-notarized-app.sh must be executable."; exit 1; }
          [ -x ./scripts/package-notarized-dmg.sh ] || { echo "scripts/package-notarized-dmg.sh must be executable."; exit 1; }

      - name: Import Apple certificate
        uses: apple-actions/import-codesign-certs@v6
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Resolve codesign identity fingerprint
        env:
          APPLE_SIGNING_IDENTITY: "Developer ID Application: SEONGMIN CHO (5YG4V2PLZV)"
        run: |
          APPLE_SIGNING_IDENTITY_REF="$(security find-identity -v -p codesigning | grep "\"$APPLE_SIGNING_IDENTITY\"" | awk 'NR == 1 { print $2 }')"
          [ -n "$APPLE_SIGNING_IDENTITY_REF" ] || { echo "Unable to resolve codesigning identity fingerprint for $APPLE_SIGNING_IDENTITY"; exit 1; }

  release_app:
    needs: release_preflight
    runs-on: macos-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      TARGET: aarch64-apple-darwin
      ARCH_LABEL: aarch64
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install dependencies
        run: pnpm install

      - name: Import Apple certificate
        uses: apple-actions/import-codesign-certs@v6
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Resolve signing identity and provisioning profile
        env:
          APPLE_SIGNING_IDENTITY: "Developer ID Application: SEONGMIN CHO (5YG4V2PLZV)"
          APPLE_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
        run: |
          APPLE_SIGNING_IDENTITY_REF="$(security find-identity -v -p codesigning | grep "\"$APPLE_SIGNING_IDENTITY\"" | awk 'NR == 1 { print $2 }')"
          [ -n "$APPLE_SIGNING_IDENTITY_REF" ] || { echo "Unable to resolve codesigning identity fingerprint for $APPLE_SIGNING_IDENTITY"; exit 1; }
          PROFILE_PATH="$RUNNER_TEMP/madi-cloudkit.provisionprofile"
          printf '%s' "$APPLE_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"
          {
            echo "APPLE_SIGNING_IDENTITY_REF=$APPLE_SIGNING_IDENTITY_REF"
            echo "PROFILE_PATH=$PROFILE_PATH"
          } >> "$GITHUB_ENV"

      - name: Build app bundle
        run: ./scripts/package-notarized-app.sh build "$TARGET"

      - name: Embed provisioning profile
        run: ./scripts/package-notarized-app.sh embed-profile "$TARGET" "$PROFILE_PATH"

      - name: Sign helper bundle
        env:
          APPLE_SIGNING_IDENTITY_REF: ${{ env.APPLE_SIGNING_IDENTITY_REF }}
        run: ./scripts/package-notarized-app.sh sign-helper "$TARGET"

      - name: Sign app bundle
        env:
          APPLE_SIGNING_IDENTITY_REF: ${{ env.APPLE_SIGNING_IDENTITY_REF }}
        run: ./scripts/package-notarized-app.sh sign-app "$TARGET"

      - name: Zip app for notarization
        run: |
          APP_ZIP_PATH="$(./scripts/package-notarized-app.sh zip-for-notarization "$TARGET" "$ARCH_LABEL" "$PWD")"
          echo "APP_ZIP_PATH=$APP_ZIP_PATH" >> "$GITHUB_ENV"

      - name: Submit app for notarization
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: ./scripts/package-notarized-app.sh notarize "$APP_ZIP_PATH"

      - name: Staple and verify app
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: ./scripts/package-notarized-app.sh staple-and-verify "$TARGET"

      - name: Package updater artifacts
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: ./scripts/package-notarized-app.sh package-updater "$TARGET" "$ARCH_LABEL" "$PWD"

      - name: Upload notarized app artifact
        uses: actions/upload-artifact@v4
        with:
          name: notarized-app
          path: |
            Madi_aarch64.app.tar.gz
            Madi_aarch64.app.tar.gz.sig
          if-no-files-found: error
          retention-days: 1

  release_release_assets:
    needs: release_app
    runs-on: macos-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download notarized app artifacts
        uses: actions/download-artifact@v4
        with:
          name: notarized-app

      - name: Create or update draft GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          TITLE="Madi $TAG"
          NOTES="Madi $TAG 업데이트"

          if gh release view "$TAG" >/dev/null 2>&1; then
            RELEASE_ID="$(gh api repos/${{ github.repository }}/releases/tags/$TAG --jq '.id')"
            gh api repos/${{ github.repository }}/releases/"$RELEASE_ID" \
              --method PATCH \
              -f name="$TITLE" \
              -f body="$NOTES" >/dev/null
          else
            gh release create "$TAG" --draft --title "$TITLE" --notes "$NOTES"
          fi

      - name: Validate updater release assets
        run: |
          for FILE in \
            Madi_aarch64.app.tar.gz \
            Madi_aarch64.app.tar.gz.sig
          do
            [ -f "$FILE" ] || { echo "Missing release asset: $FILE"; exit 1; }
            [ -s "$FILE" ] || { echo "Empty release asset: $FILE"; exit 1; }
          done

          python3 - <<'PY'
          import tarfile

          for archive_name in (
              "Madi_aarch64.app.tar.gz",
          ):
              with tarfile.open(archive_name, "r:gz") as archive:
                  invalid = [
                      member.name
                      for member in archive.getmembers()
                      if member.name.startswith("._")
                      or "/._" in member.name
                      or member.name.endswith("/.DS_Store")
                      or member.name.endswith(".DS_Store")
                  ]
                  if invalid:
                      raise SystemExit(f"{archive_name} contains unsupported Apple metadata entries: {invalid}")
          PY

          TMP_VALIDATE_DIR="$(mktemp -d "${RUNNER_TEMP}/madi-updater-validate.XXXXXX")"
          trap 'rm -rf "$TMP_VALIDATE_DIR"' EXIT
          for FILE in Madi_aarch64.app.tar.gz; do
            EXTRACT_DIR="$TMP_VALIDATE_DIR/${FILE%.tar.gz}"
            mkdir -p "$EXTRACT_DIR"
            tar -xzf "$FILE" -C "$EXTRACT_DIR"
            [ -d "$EXTRACT_DIR/Madi.app" ] || { echo "Updater archive did not extract Madi.app from $FILE"; exit 1; }
          done

      - name: Upload updater release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          ARM_APP_TAR_FILE="Madi_aarch64.app.tar.gz"
          ARM_SIG_FILE="Madi_aarch64.app.tar.gz.sig"

          gh release upload "$TAG" "$ARM_APP_TAR_FILE#Madi_aarch64.app.tar.gz" --clobber
          gh release upload "$TAG" "$ARM_SIG_FILE#Madi_aarch64.app.tar.gz.sig" --clobber

          ARM_SIGNATURE="$(cat "$ARM_SIG_FILE")"
          PUB_DATE="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          ARM_DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/$TAG/Madi_aarch64.app.tar.gz"

          jq -n \
            --arg version "$VERSION" \
            --arg notes "Madi $TAG 업데이트" \
            --arg pub_date "$PUB_DATE" \
            --arg arm_sig "$ARM_SIGNATURE" \
            --arg arm_url "$ARM_DOWNLOAD_URL" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": { signature: $arm_sig, url: $arm_url }
              }
            }' > latest.json

          jq -e '.version and .pub_date and .platforms["darwin-aarch64"]' latest.json >/dev/null
          grep -q "Madi_aarch64.app.tar.gz" latest.json

          gh release upload "$TAG" latest.json --clobber

      - name: Write updater release summary
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_URL="$(gh release view "${{ github.ref_name }}" --json url --jq '.url')"
          {
            echo "## Updater assets uploaded"
            echo ""
            echo "- Release: $RELEASE_URL"
            echo "- Assets: Madi_aarch64.app.tar.gz, Madi_aarch64.app.tar.gz.sig, latest.json"
          } >> "$GITHUB_STEP_SUMMARY"

  release_dmg:
    needs: release_app
    runs-on:
      - self-hosted
      - macOS
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download notarized app artifacts
        uses: actions/download-artifact@v4
        with:
          name: notarized-app

      - name: Check self-hosted tooling and identity
        env:
          APPLE_SIGNING_IDENTITY: "Developer ID Application: SEONGMIN CHO (5YG4V2PLZV)"
        run: |
          command -v gh
          command -v codesign
          command -v xcrun
          command -v hdiutil
          command -v dmgbuild
          xcrun notarytool --version
          [ -x ./scripts/create-dmg.sh ] || { echo "scripts/create-dmg.sh must be executable."; exit 1; }
          [ -x ./scripts/package-notarized-dmg.sh ] || { echo "scripts/package-notarized-dmg.sh must be executable."; exit 1; }
          APPLE_SIGNING_IDENTITY_REF="$(security find-identity -v -p codesigning | grep "\"$APPLE_SIGNING_IDENTITY\"" | awk 'NR == 1 { print $2 }')"
          [ -n "$APPLE_SIGNING_IDENTITY_REF" ] || { echo "Unable to resolve codesigning identity fingerprint for $APPLE_SIGNING_IDENTITY"; exit 1; }

      - name: Import Apple certificate
        uses: apple-actions/import-codesign-certs@v6
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Extract notarized app bundle
        run: |
          mkdir -p dist/app
          tar -xzf Madi_aarch64.app.tar.gz -C dist/app

      - name: Create signed and notarized DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: "Developer ID Application: SEONGMIN CHO (5YG4V2PLZV)"
        run: |
          APPLE_SIGNING_IDENTITY_REF="$(security find-identity -v -p codesigning | grep "\"$APPLE_SIGNING_IDENTITY\"" | awk 'NR == 1 { print $2 }')"
          [ -n "$APPLE_SIGNING_IDENTITY_REF" ] || { echo "Unable to resolve codesigning identity fingerprint for $APPLE_SIGNING_IDENTITY"; exit 1; }
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          APPLE_SIGNING_IDENTITY_REF="$APPLE_SIGNING_IDENTITY_REF" \
          APPLE_ID="$APPLE_ID" \
          APPLE_PASSWORD="$APPLE_PASSWORD" \
          APPLE_TEAM_ID="$APPLE_TEAM_ID" \
          ./scripts/package-notarized-dmg.sh full "dist/app/Madi.app" dist "$VERSION"

      - name: Upload DMG to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          gh release upload "${{ github.ref_name }}" \
            "dist/Madi_${VERSION}.dmg#Madi_${VERSION}.dmg" \
            --clobber

      - name: Write DMG release summary
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          RELEASE_URL="$(gh release view "${{ github.ref_name }}" --json url --jq '.url')"
          {
            echo "## DMG assets uploaded"
            echo ""
            echo "- Release: $RELEASE_URL"
            echo "- Assets: Madi_${VERSION}.dmg"
          } >> "$GITHUB_STEP_SUMMARY"

  finalize_release:
    needs:
      - release_release_assets
      - release_dmg
    runs-on: macos-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Verify release assets and publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          ASSETS_JSON="$(gh release view "$TAG" --repo "$GH_REPO" --json url,assets)"
          for ASSET in \
            "Madi_${VERSION}.dmg" \
            "Madi_aarch64.app.tar.gz" \
            "Madi_aarch64.app.tar.gz.sig" \
            "latest.json"
          do
            echo "$ASSETS_JSON" | jq -e --arg name "$ASSET" '.assets[] | select(.name == $name)' >/dev/null || {
              echo "Missing release asset: $ASSET"
              exit 1
            }
          done

          gh release edit "$TAG" --repo "$GH_REPO" --draft=false

          RELEASE_URL="$(echo "$ASSETS_JSON" | jq -r '.url')"
          {
            echo "## Release finalized"
            echo ""
            echo "- Version: $VERSION"
            echo "- Release: $RELEASE_URL"
            echo "- DMG: Madi_${VERSION}.dmg"
            echo "- Updater assets: Madi_aarch64.app.tar.gz, Madi_aarch64.app.tar.gz.sig, latest.json"
            echo "- Draft: false"
          } >> "$GITHUB_STEP_SUMMARY"
