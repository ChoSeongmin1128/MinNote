name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install dependencies
        run: pnpm install

      - name: Import Apple certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo $APPLE_CERTIFICATE | base64 --decode > certificate.p12
          echo $APPLE_PROVISIONING_PROFILE | base64 --decode > src-tauri/embedded.provisionprofile
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

      - name: Build Swift sidecar (arm64)
        run: |
          mkdir -p src-tauri/binaries
          cd sync-sidecar
          swift build -c release --arch arm64
          cp .build/arm64-apple-macosx/release/MNSyncDaemon ../src-tauri/binaries/minnote-sync-aarch64-apple-darwin

      - name: Build Swift sidecar (x86_64)
        run: |
          cd sync-sidecar
          swift build -c release --arch x86_64
          cp .build/x86_64-apple-macosx/release/MNSyncDaemon ../src-tauri/binaries/minnote-sync-x86_64-apple-darwin

      - name: Build macOS bundles
        env:
          CI: true
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: "Developer ID Application: SEONGMIN CHO (5YG4V2PLZV)"
        run: |
          for attempt in 1 2 3; do
            echo "Build attempt ${attempt}/3"

            rm -rf src-tauri/target/release/bundle/dmg
            rm -rf src-tauri/target/release/bundle/macos/MinNote.app
            rm -f src-tauri/target/release/bundle/macos/MinNote.app.tar.gz
            rm -f src-tauri/target/release/bundle/macos/MinNote.app.tar.gz.sig
            rm -f src-tauri/target/release/bundle/macos/MinNote_*.dmg

            for mount in /Volumes/MinNote*; do
              [ -e "$mount" ] || continue
              hdiutil detach "$mount" || true
            done

            if pnpm tauri build --bundles app,dmg --verbose; then
              exit 0
            fi

            status=$?
            echo "Build attempt ${attempt} failed with exit code ${status}"

            if [ "$attempt" -eq 3 ]; then
              exit "$status"
            fi

            sleep $((attempt * 5))
          done

      - name: Verify macOS signing
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          APP_PATH="$(find src-tauri/target/release/bundle/macos -maxdepth 1 -name 'MinNote.app' -print -quit)"

          if [ -z "$APP_PATH" ] || [ ! -d "$APP_PATH" ]; then
            echo "MinNote.app not found after build"
            exit 1
          fi

          SIGN_INFO="$(codesign -dv --verbose=4 "$APP_PATH" 2>&1)"
          echo "$SIGN_INFO"

          echo "$SIGN_INFO" | grep -q "Authority=Developer ID Application: SEONGMIN CHO ($APPLE_TEAM_ID)"
          echo "$SIGN_INFO" | grep -q "TeamIdentifier=$APPLE_TEAM_ID"

          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          xcrun stapler validate "$APP_PATH"

      - name: Create or update GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          TITLE="MinNote $TAG"
          NOTES="MinNote $TAG 업데이트"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TITLE" --notes "$NOTES"
          else
            gh release create "$TAG" --title "$TITLE" --notes "$NOTES"
          fi

      - name: Upload release bundles
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          DMG_FILE="$(find src-tauri/target/release/bundle/dmg -type f -name 'MinNote_*_aarch64.dmg' -print -quit)"
          APP_TAR_FILE="$(find src-tauri/target -type f -name 'MinNote*.app.tar.gz' -print -quit)"

          if [ -z "$DMG_FILE" ] || [ ! -f "$DMG_FILE" ]; then
            echo "DMG file not found"
            exit 1
          fi

          if [ -z "$APP_TAR_FILE" ] || [ ! -f "$APP_TAR_FILE" ]; then
            echo "App archive not found"
            find src-tauri/target -type f -name '*.app.tar.gz' -print || true
            exit 1
          fi

          gh release upload "$TAG" "$DMG_FILE#$(basename "$DMG_FILE")" --clobber
          gh release upload "$TAG" "$APP_TAR_FILE#MinNote_aarch64.app.tar.gz" --clobber

      - name: Upload updater assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          SIG_FILE="$(find src-tauri/target -type f -name 'MinNote*.app.tar.gz.sig' -print -quit)"

          if [ -z "$SIG_FILE" ] || [ ! -f "$SIG_FILE" ]; then
            echo "Signature file not found, skipping updater assets upload"
            find src-tauri/target -type f \( -name '*.app.tar.gz' -o -name '*.app.tar.gz.sig' \) -print || true
            exit 0
          fi

          SIGNATURE=$(cat "$SIG_FILE")
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/$TAG/MinNote_aarch64.app.tar.gz"

          jq -n \
            --arg version "$VERSION" \
            --arg notes "MinNote $TAG 업데이트" \
            --arg pub_date "$PUB_DATE" \
            --arg sig "$SIGNATURE" \
            --arg url "$DOWNLOAD_URL" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": { signature: $sig, url: $url }
              }
            }' > latest.json

          gh release upload "$TAG" "$SIG_FILE#MinNote_aarch64.app.tar.gz.sig" --clobber
          gh release upload "$TAG" latest.json --clobber
