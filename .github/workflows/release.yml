name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release_app:
    runs-on: macos-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install dependencies
        run: pnpm install

      - name: Import Apple certificate
        uses: apple-actions/import-codesign-certs@v6
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Build, sign, notarize, and package app bundles
        env:
          CI: true
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: "Developer ID Application: SEONGMIN CHO (5YG4V2PLZV)"
          APPLE_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          unset TAURI_SIGNING_PRIVATE_KEY_PATH
          APP_ENTITLEMENTS_PATH="src-tauri/Entitlements.plist"
          HELPER_ENTITLEMENTS_PATH="src-tauri/Entitlements.Helper.plist"
          APPLE_SIGNING_IDENTITY_REF="$(security find-identity -v -p codesigning | grep "\"$APPLE_SIGNING_IDENTITY\"" | awk 'NR == 1 { print $2 }')"
          if [ -z "$APPLE_SIGNING_IDENTITY_REF" ]; then
            echo "Unable to resolve codesigning identity fingerprint for $APPLE_SIGNING_IDENTITY"
            exit 1
          fi
          if [ -z "${APPLE_PROVISIONING_PROFILE_BASE64:-}" ]; then
            echo "APPLE_PROVISIONING_PROFILE_BASE64 secret is required for CloudKit-enabled release builds."
            exit 1
          fi
          PROFILE_PATH="$RUNNER_TEMP/minnote-cloudkit.provisionprofile"
          printf '%s' "$APPLE_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"

          for TARGET in aarch64-apple-darwin x86_64-apple-darwin
          do
            case "$TARGET" in
              aarch64-apple-darwin) ARCH_LABEL="aarch64" ;;
              x86_64-apple-darwin) ARCH_LABEL="x86_64" ;;
            esac

            pnpm exec tauri build --bundles app --target "$TARGET" --no-sign --verbose

            APP_PATH="src-tauri/target/$TARGET/release/bundle/macos/MinNote.app"
            APP_ZIP_PATH="MinNote_${ARCH_LABEL}.app.zip"
            APP_TAR_PATH="MinNote_${ARCH_LABEL}.app.tar.gz"

            if [ ! -d "$APP_PATH" ]; then
              echo "MinNote.app not found for $TARGET"
              exit 1
            fi

            xattr -crs "$APP_PATH"
            cp "$PROFILE_PATH" "$APP_PATH/Contents/embedded.provisionprofile"
            HELPER_APP_PATH="$APP_PATH/Contents/Resources/minnote-cloudkit-bridge.app"
            HELPER_EXEC_PATH="$HELPER_APP_PATH/Contents/MacOS/minnote-cloudkit-bridge"
            if [ -f "$HELPER_EXEC_PATH" ]; then
              cp "$PROFILE_PATH" "$HELPER_APP_PATH/Contents/embedded.provisionprofile"
              codesign --force --sign "$APPLE_SIGNING_IDENTITY_REF" --options runtime --entitlements "$HELPER_ENTITLEMENTS_PATH" "$HELPER_EXEC_PATH"
              codesign --force --sign "$APPLE_SIGNING_IDENTITY_REF" --options runtime --entitlements "$HELPER_ENTITLEMENTS_PATH" "$HELPER_APP_PATH"
            fi
            codesign --force --sign "$APPLE_SIGNING_IDENTITY_REF" --options runtime --entitlements "$APP_ENTITLEMENTS_PATH" "$APP_PATH/Contents/MacOS/minnote"
            codesign --force --sign "$APPLE_SIGNING_IDENTITY_REF" --options runtime --entitlements "$APP_ENTITLEMENTS_PATH" "$APP_PATH"

            rm -f "$APP_ZIP_PATH"
            ditto -c -k --keepParent --sequesterRsrc "$APP_PATH" "$APP_ZIP_PATH"

            xcrun notarytool submit "$APP_ZIP_PATH" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait

            xcrun stapler staple "$APP_PATH"

            SIGN_INFO="$(codesign -dv --verbose=4 "$APP_PATH" 2>&1)"
            echo "$SIGN_INFO"
            echo "$SIGN_INFO" | grep -q "Authority=Developer ID Application: SEONGMIN CHO ($APPLE_TEAM_ID)"
            echo "$SIGN_INFO" | grep -q "TeamIdentifier=$APPLE_TEAM_ID"

            codesign --verify --deep --strict --verbose=2 "$APP_PATH"
            xcrun stapler validate "$APP_PATH"
            spctl -a -vv -t exec "$APP_PATH"

            tar -czf "$APP_TAR_PATH" -C "$(dirname "$APP_PATH")" "$(basename "$APP_PATH")"
            pnpm exec tauri signer sign "$APP_TAR_PATH"
          done

      - name: Upload notarized app artifact
        uses: actions/upload-artifact@v4
        with:
          name: notarized-app-bundle
          path: |
            MinNote_aarch64.app.tar.gz
            MinNote_x86_64.app.tar.gz
          if-no-files-found: error
          retention-days: 1

      - name: Create or update draft GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          TITLE="MinNote $TAG"
          NOTES="MinNote $TAG 업데이트"

          if gh release view "$TAG" >/dev/null 2>&1; then
            RELEASE_ID="$(gh api repos/${{ github.repository }}/releases/tags/$TAG --jq '.id')"
            gh api repos/${{ github.repository }}/releases/"$RELEASE_ID" \
              --method PATCH \
              -f draft=true \
              -f name="$TITLE" \
              -f body="$NOTES" >/dev/null
          else
            gh release create "$TAG" --draft --title "$TITLE" --notes "$NOTES"
          fi

      - name: Upload updater release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          ARM_APP_TAR_FILE="MinNote_aarch64.app.tar.gz"
          ARM_SIG_FILE="MinNote_aarch64.app.tar.gz.sig"
          X64_APP_TAR_FILE="MinNote_x86_64.app.tar.gz"
          X64_SIG_FILE="MinNote_x86_64.app.tar.gz.sig"

          for FILE in "$ARM_APP_TAR_FILE" "$ARM_SIG_FILE" "$X64_APP_TAR_FILE" "$X64_SIG_FILE"
          do
            if [ ! -f "$FILE" ]; then
              echo "Missing release asset: $FILE"
              exit 1
            fi
          done

          gh release upload "$TAG" "$ARM_APP_TAR_FILE#MinNote_aarch64.app.tar.gz" --clobber
          gh release upload "$TAG" "$ARM_SIG_FILE#MinNote_aarch64.app.tar.gz.sig" --clobber
          gh release upload "$TAG" "$X64_APP_TAR_FILE#MinNote_x86_64.app.tar.gz" --clobber
          gh release upload "$TAG" "$X64_SIG_FILE#MinNote_x86_64.app.tar.gz.sig" --clobber

          ARM_SIGNATURE="$(cat "$ARM_SIG_FILE")"
          X64_SIGNATURE="$(cat "$X64_SIG_FILE")"
          PUB_DATE="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          ARM_DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/$TAG/MinNote_aarch64.app.tar.gz"
          X64_DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/$TAG/MinNote_x86_64.app.tar.gz"

          jq -n \
            --arg version "$VERSION" \
            --arg notes "MinNote $TAG 업데이트" \
            --arg pub_date "$PUB_DATE" \
            --arg arm_sig "$ARM_SIGNATURE" \
            --arg arm_url "$ARM_DOWNLOAD_URL" \
            --arg x64_sig "$X64_SIGNATURE" \
            --arg x64_url "$X64_DOWNLOAD_URL" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": { signature: $arm_sig, url: $arm_url },
                "darwin-x86_64": { signature: $x64_sig, url: $x64_url }
              }
            }' > latest.json

          gh release upload "$TAG" latest.json --clobber

  release_dmg:
    needs: release_app
    runs-on:
      - self-hosted
      - macOS
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download notarized app artifact
        uses: actions/download-artifact@v4
        with:
          name: notarized-app-bundle

      - name: Check self-hosted tooling
        run: |
          command -v gh
          command -v codesign
          command -v xcrun
          xcrun notarytool --version

      - name: Import Apple certificate
        uses: apple-actions/import-codesign-certs@v6
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Extract notarized app bundle
        run: |
          mkdir -p dist/aarch64 dist/x86_64
          tar -xzf MinNote_aarch64.app.tar.gz -C dist/aarch64
          tar -xzf MinNote_x86_64.app.tar.gz -C dist/x86_64

      - name: Create signed and notarized DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: "Developer ID Application: SEONGMIN CHO (5YG4V2PLZV)"
        run: |
          APPLE_SIGNING_IDENTITY_REF="$(security find-identity -v -p codesigning | grep "\"$APPLE_SIGNING_IDENTITY\"" | awk 'NR == 1 { print $2 }')"
          if [ -z "$APPLE_SIGNING_IDENTITY_REF" ]; then
            echo "Unable to resolve codesigning identity fingerprint for $APPLE_SIGNING_IDENTITY"
            exit 1
          fi
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          for ARCH in aarch64 x86_64
          do
            DMG_PATH="$(./scripts/create-dmg.sh "dist/$ARCH/MinNote.app" dist "$VERSION" "$ARCH")"
            codesign --force --sign "$APPLE_SIGNING_IDENTITY_REF" "$DMG_PATH"
            xcrun notarytool submit "$DMG_PATH" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait
            xcrun stapler staple "$DMG_PATH"
          done

      - name: Verify DMG
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          for ARCH in aarch64 x86_64
          do
            DMG_PATH="dist/MinNote_${VERSION}_${ARCH}.dmg"
            xcrun stapler validate "$DMG_PATH"
            spctl --assess --type open --context context:primary-signature --verbose=4 "$DMG_PATH"
          done

      - name: Upload DMG to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          gh release upload "${{ github.ref_name }}" \
            "dist/MinNote_${VERSION}_aarch64.dmg#MinNote_${VERSION}_aarch64.dmg" \
            "dist/MinNote_${VERSION}_x86_64.dmg#MinNote_${VERSION}_x86_64.dmg" \
            --clobber

      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ github.ref_name }}" --draft=false

      - name: Publish GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_ID="$(gh api repos/${{ github.repository }}/releases/tags/${{ github.ref_name }} --jq '.id')"
          gh api repos/${{ github.repository }}/releases/"$RELEASE_ID" \
            --method PATCH \
            -f draft=false >/dev/null
